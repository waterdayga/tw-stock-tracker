<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台股資產追蹤</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; font-family: sans-serif; }
        #root:empty::before { content: "系統初始化中，請稍候..."; display: block; text-align: center; margin-top: 50px; color: #64748b; }
        .card { background-color: #1e293b; border-radius: 12px; border: 1px solid #334155; }
        .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #64748b; font-size: 12px; }
        .nav-btn.active { color: #3b82f6; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 解構常用組件
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

        // 圖表提示框
        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                const val = payload[0].value || 0;
                const cost = payload[1] ? payload[1].value : 0;
                return (
                    <div className="bg-slate-800 p-3 border border-slate-600 rounded-lg shadow-xl text-sm">
                        <p className="text-slate-400 mb-1">{label}</p>
                        <p className="text-blue-400 font-medium">市值: ${val.toLocaleString()}</p>
                        <p className="text-amber-500 font-medium">成本: ${cost.toLocaleString()}</p>
                    </div>
                );
            }
            return null;
        };

        function App() {
            const [transactions, setTransactions] = useState([]);
            const [prices, setPrices] = useState({});
            const [view, setView] = useState('summary'); 
            const [showSettings, setShowSettings] = useState(false);
            const [loadingPrices, setLoadingPrices] = useState(false);

            // 讀取本地資料
            useEffect(() => {
                const localData = localStorage.getItem('local_transactions');
                if (localData) {
                    try {
                        setTransactions(JSON.parse(localData));
                    } catch(e) { console.error("資料格式錯誤"); }
                }
            }, []);

            // Yahoo Finance 報價
            const fetchPrices = async () => {
                const symbols = [...new Set(transactions.map(t => t.symbol))];
                if (symbols.length === 0) return alert("請先匯入資料");
                setLoadingPrices(true);
                try {
                    const yfSymbols = symbols.map(s => s.length === 4 ? `${s}.TW` : `${s}.TWO`).join(',');
                    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${yfSymbols}`;
                    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    
                    const priceMap = {};
                    if(data.quoteResponse?.result) {
                        data.quoteResponse.result.forEach(item => {
                            const sym = item.symbol.split('.')[0];
                            priceMap[sym] = { price: item.regularMarketPrice, name: item.longName };
                        });
                        setPrices(priceMap);
                    }
                } catch (e) { alert("報價更新失敗"); }
                setLoadingPrices(false);
            };

            // Excel 匯入 (跳過前兩行)
            const onImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const data = XLSX.utils.sheet_to_json(ws, { header: 1, range: 2 });
                    
                    const imported = data.filter(r => r[0] && r[1]).map(r => ({
                        date: r[0],
                        symbol: String(r[1]),
                        name: r[2] || '',
                        action: (r[3] === '買入' || r[3] === 'buy') ? 'buy' : 'sell',
                        shares: Number(r[4]),
                        price: Number(r[5]),
                        fee: Number(r[6] || 0),
                        tax: Number(r[7] || 0)
                    }));
                    
                    const newList = [...imported, ...transactions];
                    setTransactions(newList);
                    localStorage.setItem('local_transactions', JSON.stringify(newList));
                    alert(`成功匯入 ${imported.length} 筆`);
                };
                reader.readAsBinaryString(file);
            };

            // 計算邏輯
            const holdings = useMemo(() => {
                const map = {};
                transactions.forEach(t => {
                    if (!map[t.symbol]) map[t.symbol] = { symbol: t.symbol, name: t.name, shares: 0, cost: 0 };
                    const isBuy = t.action === 'buy';
                    if (isBuy) {
                        map[t.symbol].shares += t.shares;
                        map[t.symbol].cost += (t.shares * t.price + t.fee + t.tax);
                    } else {
                        const avg = map[t.symbol].cost / map[t.symbol].shares;
                        map[t.symbol].shares -= t.shares;
                        map[t.symbol].cost -= (avg * t.shares);
                    }
                });
                return Object.values(map).filter(h => h.shares > 0);
            }, [transactions]);

            const mValue = holdings.reduce((s, h) => s + (h.shares * (prices[h.symbol]?.price || 0)), 0);
            const totalC = holdings.reduce((s, h) => s + h.cost, 0);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col">
                    <header className="p-4 flex justify-between items-center border-b border-slate-800 bg-slate-900 sticky top-0 z-10">
                        <h1 className="text-lg font-bold text-blue-400">台股資產追蹤</h1>
                        <div className="flex gap-3">
                            <button onClick={fetchPrices} className="p-2 card text-sm">{loadingPrices ? '⌛' : '🔄'}</button>
                            <button onClick={() => setShowSettings(!showSettings)} className="p-2 card text-sm">⚙</button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 pb-24">
                        {showSettings && (
                            <div className="p-4 card mb-6 space-y-4">
                                <h2 className="text-sm font-bold text-blue-300">資料管理</h2>
                                <input type="file" onChange={onImport} className="text-xs w-full" />
                                <button className="w-full py-2 bg-red-900/30 text-red-400 text-xs rounded-lg" onClick={() => {
                                    if(confirm("確定清空？")) { localStorage.clear(); setTransactions([]); }
                                }}>清空所有資料</button>
                            </div>
                        )}

                        {view === 'summary' ? (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="card p-4">
                                        <p className="text-[10px] text-slate-500 uppercase">總市值</p>
                                        <p className="text-lg font-bold">${mValue.toLocaleString()}</p>
                                    </div>
                                    <div className="card p-4">
                                        <p className="text-[10px] text-slate-500 uppercase">總投入</p>
                                        <p className="text-lg font-bold">${totalC.toLocaleString()}</p>
                                    </div>
                                </div>
                                
                                <div className="pt-2">
                                    <h3 className="text-sm font-bold text-slate-400 mb-3">持股明細</h3>
                                    {holdings.length === 0 && <p className="text-center text-slate-600 py-10 text-sm">點擊右上齒輪匯入 Excel</p>}
                                    {holdings.map(h => (
                                        <div key={h.symbol} className="card p-4 mb-3 flex justify-between">
                                            <div>
                                                <p className="font-bold text-sm">{h.symbol} <span className="text-slate-400 font-normal">{h.name}</span></p>
                                                <p className="text-[10px] text-slate-500">{h.shares} 股 | 成本 ${Math.round(h.cost/h.shares)}</p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-sm font-bold">${prices[h.symbol]?.price || '--'}</p>
                                                <p className={`text-[10px] ${((prices[h.symbol]?.price || 0) - h.cost/h.shares) >= 0 ? 'text-red-400' : 'text-green-400'}`}>
                                                    {prices[h.symbol] ? (((prices[h.symbol].price - h.cost/h.shares) / (h.cost/h.shares) * 100).toFixed(2) + '%') : '--'}
                                                </p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="card p-4 h-64">
                                <p className="text-center text-xs text-slate-500 mb-4">資產成長趨勢</p>
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={transactions.map(t => ({ date: t.date, value: 0 })) /* 簡化示意 */}>
                                        <CartesianGrid strokeDasharray="3 3" stroke="#334155" vertical={false} />
                                        <XAxis dataKey="date" hide />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Area type="monotone" dataKey="value" stroke="#3b82f6" fill="#3b82f6" fillOpacity={0.1} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        )}
                    </main>

                    <footer className="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-slate-800 p-3 flex justify-around">
                        <button onClick={() => setView('summary')} className={`nav-btn ${view === 'summary' ? 'active' : ''}`}>
                            <span className="text-xl">📋</span><span>總覽</span>
                        </button>
                        <button onClick={() => setView('trend')} className={`nav-btn ${view === 'trend' ? 'active' : ''}`}>
                            <span className="text-xl">📈</span><span>趨勢</span>
                        </button>
                    </footer>
                </div>
            );
        }

        // 啟動 React
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
