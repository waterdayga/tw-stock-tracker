<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台股資產追蹤</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .card { background-color: #1e293b; border-radius: 12px; border: 1px solid #334155; }
        input, select { background-color: #0f172a; border: 1px solid #334155; color: #f8fafc; border-radius: 6px; padding: 8px; }
        .btn-primary { background-color: #3b82f6; color: white; border-radius: 8px; padding: 10px 20px; font-weight: 600; }
        /* 針對行動裝置優化 */
        @media (max-width: 480px) {
            .container { padding-left: 12px; padding-right: 12px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

        // --- 自定義 Tooltip 組件 ---
        const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
                const marketValue = payload[0].value;
                const cost = payload[1] ? payload[1].value : 0;
                const profit = marketValue - cost;
                const percent = cost !== 0 ? ((profit / cost) * 100).toFixed(2) : 0;
                return (
                    <div className="bg-slate-800 p-3 border border-slate-600 rounded-lg shadow-xl text-sm">
                        <p className="text-slate-400 mb-1">{label}</p>
                        <p className="text-blue-400">市值: ${marketValue.toLocaleString()}</p>
                        <p className="text-amber-500">成本: ${cost.toLocaleString()}</p>
                        <div className="mt-1 pt-1 border-t border-slate-700">
                            <p className={profit >= 0 ? 'text-red-400' : 'text-green-400'}>
                                損益: ${profit.toLocaleString()} ({percent}%)
                            </p>
                        </div>
                    </div>
                );
            }
            return null;
        };

        function App() {
            const [transactions, setTransactions] = useState([]);
            const [prices, setPrices] = useState({});
            const [loading, setLoading] = useState(true);
            const [updating, setUpdating] = useState(false);
            const [lastUpdate, setLastUpdate] = useState('');
            const [supabaseConfig, setSupabaseConfig] = useState({ url: '', key: '' });
            const [view, setView] = useState('summary'); // summary, detail, trend
            const [showSettings, setShowSettings] = useState(false);

            // 1. 初始化資料
            useEffect(() => {
                const savedConfig = localStorage.getItem('supabase_config');
                if (savedConfig) {
                    const config = JSON.parse(savedConfig);
                    setSupabaseConfig(config);
                    fetchFromSupabase(config);
                } else {
                    const localData = localStorage.getItem('local_transactions');
                    if (localData) setTransactions(JSON.parse(localData));
                    setLoading(false);
                }
            }, []);

            const fetchFromSupabase = async (config) => {
                try {
                    const supabase = window.supabase.createClient(config.url, config.key);
                    const { data, error } = await supabase.from('transactions').select('*').order('date', { ascending: false });
                    if (error) throw error;
                    setTransactions(data);
                } catch (err) {
                    console.error("Supabase 連線失敗:", err);
                } finally {
                    setLoading(false);
                }
            };

            // 2. Yahoo Finance 報價邏輯
            const fetchStockPrices = async () => {
                const symbols = [...new Set(transactions.map(t => t.symbol))];
                if (symbols.length === 0) return;
                setUpdating(true);
                try {
                    // 自動判定：4碼通常為 .TW (上市)，其他(如 6488) 試 .TWO (上櫃)
                    const yfSymbols = symbols.map(s => s.length === 4 ? `${s}.TW` : `${s}.TWO`).join(',');
                    const targetUrl = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${yfSymbols}`;
                    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`);
                    const data = await res.json();
                    
                    const priceMap = {};
                    data.quoteResponse.result.forEach(item => {
                        const sym = item.symbol.split('.')[0];
                        priceMap[sym] = {
                            price: item.regularMarketPrice,
                            prevClose: item.regularMarketPreviousClose,
                            name: item.longName
                        };
                    });
                    setPrices(prev => ({ ...prev, ...priceMap }));
                    setLastUpdate(new Date().toLocaleTimeString());
                } catch (error) {
                    alert("報價更新失敗，請確認網路連線");
                } finally {
                    setUpdating(false);
                }
            };

            // 3. Excel 匯入邏輯 (跳過前兩行)
            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    // range: 2 表示從第 3 行開始讀取 (0, 1, 2...)
                    const data = XLSX.utils.sheet_to_json(ws, { header: 1, range: 2 });
                    
                    const imported = data.filter(row => row[0] && row[1]).map(row => ({
                        date: row[0],
                        symbol: String(row[1]),
                        name: row[2] || '',
                        action: row[3] === '買入' ? 'buy' : 'sell',
                        shares: Number(row[4]),
                        price: Number(row[5]),
                        fee: Number(row[6] || 0),
                        tax: Number(row[7] || 0)
                    }));
                    if (confirm(`預覽完成，準備匯入 ${imported.length} 筆資料？`)) {
                        saveTransactions([...imported, ...transactions]);
                    }
                };
                reader.readAsBinaryString(file);
            };

            const saveTransactions = async (newDocs) => {
                setTransactions(newDocs);
                if (supabaseConfig.url) {
                    // 同步到 Supabase 的邏輯...
                } else {
                    localStorage.setItem('local_transactions', JSON.stringify(newDocs));
                }
            };

            // 4. 計算持股邏輯 (簡化版)
            const holdings = useMemo(() => {
                const map = {};
                transactions.forEach(t => {
                    if (!map[t.symbol]) map[t.symbol] = { symbol: t.symbol, name: t.name, shares: 0, cost: 0 };
                    if (t.action === 'buy') {
                        map[t.symbol].shares += t.shares;
                        map[t.symbol].cost += (t.shares * t.price + t.fee);
                    } else {
                        const avgCost = map[t.symbol].cost / map[t.symbol].shares;
                        map[t.symbol].shares -= t.shares;
                        map[t.symbol].cost -= (avgCost * t.shares);
                    }
                });
                return Object.values(map).filter(h => h.shares > 0);
            }, [transactions]);

            // 5. 趨勢圖資料處理 (市值 vs 成本)
            const chartData = useMemo(() => {
                // 此處為示意邏輯，實際應依日期排序並累加
                const dates = [...new Set(transactions.map(t => t.date))].sort();
                let cumulativeCost = 0;
                return dates.map(d => {
                    transactions.filter(t => t.date === d).forEach(t => {
                        cumulativeCost += t.action === 'buy' ? (t.shares * t.price + t.fee) : -(t.shares * t.price);
                    });
                    const dailyValue = holdings.reduce((sum, h) => sum + (h.shares * (prices[h.symbol]?.price || h.cost/h.shares)), 0);
                    return { date: d, value: Math.round(dailyValue), cost: Math.round(cumulativeCost) };
                });
            }, [transactions, prices, holdings]);

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col pb-20">
                    <header className="p-4 flex justify-between items-center sticky top-0 bg-[#0f172a] z-10">
                        <h1 className="text-xl font-bold text-blue-400">台股資產追蹤</h1>
                        <div className="flex gap-2">
                            <button onClick={fetchStockPrices} className="p-2 card hover:bg-slate-700">
                                {updating ? '更新中...' : '🔄'}
                            </button>
                            <button onClick={() => setShowSettings(!showSettings)} className="p-2 card">⚙</button>
                        </div>
                    </header>

                    {showSettings && (
                        <div className="p-4 card m-4 space-y-3">
                            <h3 className="font-bold">Supabase 設定</h3>
                            <input className="w-full" placeholder="URL" value={supabaseConfig.url} onChange={e => setSupabaseConfig({...supabaseConfig, url: e.target.value})} />
                            <input className="w-full" type="password" placeholder="Anon Key" value={supabaseConfig.key} onChange={e => setSupabaseConfig({...supabaseConfig, key: e.target.value})} />
                            <button className="btn-primary w-full" onClick={() => {
                                localStorage.setItem('supabase_config', JSON.stringify(supabaseConfig));
                                alert('設定已儲存，請重新整理');
                            }}>儲存設定</button>
                            <div className="pt-2 border-t border-slate-700">
                                <label className="block text-sm text-slate-400 mb-1">匯入 Excel (範本格式)</label>
                                <input type="file" onChange={handleFileUpload} className="text-sm" />
                            </div>
                        </div>
                    )}

                    <main className="flex-1 p-4">
                        {view === 'summary' && (
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="card p-4">
                                        <p className="text-xs text-slate-400">資產市值</p>
                                        <p className="text-lg font-bold">
                                            ${holdings.reduce((sum, h) => sum + (h.shares * (prices[h.symbol]?.price || 0)), 0).toLocaleString()}
                                        </p>
                                    </div>
                                    <div className="card p-4">
                                        <p className="text-xs text-slate-400">投入成本</p>
                                        <p className="text-lg font-bold">${holdings.reduce((sum, h) => sum + h.cost, 0).toLocaleString()}</p>
                                    </div>
                                </div>

                                <h3 className="font-bold pt-4">持股明細</h3>
                                {holdings.map(h => (
                                    <div key={h.symbol} className="card p-4 flex justify-between items-center">
                                        <div>
                                            <p className="font-bold">{h.symbol} {h.name}</p>
                                            <p className="text-xs text-slate-400">{h.shares} 股 | 成本 ${Math.round(h.cost/h.shares)}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="font-bold text-blue-400">${prices[h.symbol]?.price || '--'}</p>
                                            <p className={`text-xs ${(prices[h.symbol]?.price - (h.cost/h.shares)) >= 0 ? 'text-red-400' : 'text-green-400'}`}>
                                                {prices[h.symbol] ? (((prices[h.symbol].price - (h.cost/h.shares)) / (h.cost/h.shares)) * 100).toFixed(2) + '%' : '--'}
                                            </p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === 'trend' && (
                            <div className="h-64 card p-2">
                                <h3 className="text-center text-sm mb-2 text-slate-400">資產趨勢 (市值 vs 成本)</h3>
                                <ResponsiveContainer width="100%" height="100%">
                                    <AreaChart data={chartData}>
                                        <defs>
                                            <linearGradient id="colorValue" x1="0" y1="0" x2="0" y2="1">
                                                <stop offset="5%" stopColor="#3b82f6" stopOpacity={0.3}/>
                                                <stop offset="95%" stopColor="#3b82f6" stopOpacity={0}/>
                                            </linearGradient>
                                        </defs>
                                        <XAxis dataKey="date" hide />
                                        <Tooltip content={<CustomTooltip />} />
                                        <Area type="monotone" dataKey="value" stroke="#3b82f6" fillOpacity={1} fill="url(#colorValue)" strokeWidth={2} />
                                        <Area type="monotone" dataKey="cost" stroke="#f59e0b" fillOpacity={0} strokeDasharray="5 5" strokeWidth={1} />
                                    </AreaChart>
                                </ResponsiveContainer>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-[#1e293b] border-t border-slate-700 flex justify-around p-3">
                        <button onClick={() => setView('summary')} className={`text-sm ${view === 'summary' ? 'text-blue-400' : 'text-slate-400'}`}>📋 總覽</button>
                        <button onClick={() => setView('trend')} className={`text-sm ${view === 'trend' ? 'text-blue-400' : 'text-slate-400'}`}>📈 趨勢</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
