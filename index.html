<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台股資產追蹤</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.22.20/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { background-color: #0f172a; color: #f8fafc; margin: 0; font-family: sans-serif; }
        #root { min-height: 100vh; }
        .loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #64748b; }
        .card { background-color: #1e293b; border-radius: 12px; border: 1px solid #334155; }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-screen">
            <p>系統初始化中...</p>
            <p style="font-size: 12px; margin-top: 10px;">如果長時間沒反應，請嘗試重新整理</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid } = Recharts;

        // --- 報價與計算邏輯 ---
        function App() {
            const [transactions, setTransactions] = useState([]);
            const [prices, setPrices] = useState({});
            const [view, setView] = useState('summary'); 
            const [showSettings, setShowSettings] = useState(false);
            const [isUpdating, setIsUpdating] = useState(false);

            useEffect(() => {
                const data = localStorage.getItem('local_transactions');
                if (data) setTransactions(JSON.parse(data));
            }, []);

            const fetchPrices = async () => {
                const symbols = [...new Set(transactions.map(t => t.symbol))];
                if (!symbols.length) return alert("請先匯入資料");
                setIsUpdating(true);
                try {
                    const yf = symbols.map(s => s.length === 4 ? `${s}.TW` : `${s}.TWO`).join(',');
                    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${yf}`)}`);
                    const json = await res.json();
                    const map = {};
                    json.quoteResponse?.result?.forEach(item => {
                        map[item.symbol.split('.')[0]] = { price: item.regularMarketPrice };
                    });
                    setPrices(map);
                } catch (e) { alert("報價更新失敗"); }
                setIsUpdating(false);
            };

            const onImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1, range: 2 });
                    const imported = data.filter(r => r[0] && r[1]).map(r => ({
                        date: r[0], symbol: String(r[1]), name: r[2] || '',
                        action: (r[3] === '買入' || r[3] === 'buy') ? 'buy' : 'sell',
                        shares: Number(r[4]), price: Number(r[5]), fee: Number(r[6] || 0), tax: Number(r[7] || 0)
                    }));
                    const newList = [...imported, ...transactions];
                    setTransactions(newList);
                    localStorage.setItem('local_transactions', JSON.stringify(newList));
                    alert("匯入成功");
                };
                reader.readAsBinaryString(file);
            };

            const holdings = useMemo(() => {
                const map = {};
                transactions.forEach(t => {
                    if (!map[t.symbol]) map[t.symbol] = { symbol: t.symbol, name: t.name, shares: 0, cost: 0 };
                    if (t.action === 'buy') {
                        map[t.symbol].shares += t.shares;
                        map[t.symbol].cost += (t.shares * t.price + t.fee + t.tax);
                    } else {
                        const avg = map[t.symbol].cost / map[t.symbol].shares;
                        map[t.symbol].shares -= t.shares;
                        map[t.symbol].cost -= (avg * t.shares);
                    }
                });
                return Object.values(map).filter(h => h.shares > 0);
            }, [transactions]);

            const totalMV = holdings.reduce((s, h) => s + (h.shares * (prices[h.symbol]?.price || 0)), 0);
            const totalC = holdings.reduce((s, h) => s + h.cost, 0);

            return (
                <div className="max-w-md mx-auto flex flex-col min-h-screen bg-[#0f172a]">
                    <header className="p-4 flex justify-between items-center border-b border-slate-800 sticky top-0 bg-[#0f172a] z-20">
                        <h1 className="text-lg font-bold text-blue-400">台股資產追蹤</h1>
                        <div className="flex gap-2">
                            <button onClick={fetchPrices} className="p-2 card text-sm">{isUpdating ? '⏳' : '🔄'}</button>
                            <button onClick={() => setShowSettings(!showSettings)} className="p-2 card text-sm">⚙</button>
                        </div>
                    </header>

                    <main className="flex-1 p-4 mb-20">
                        {showSettings && (
                            <div className="p-4 card mb-4 space-y-4">
                                <p className="text-xs text-blue-300 font-bold uppercase">Excel 匯入 (跳過前2行)</p>
                                <input type="file" onChange={onImport} className="text-xs block w-full" />
                                <button className="w-full py-2 bg-red-900/20 text-red-500 text-xs rounded" onClick={() => { if(confirm("清空？")) {localStorage.clear(); location.reload();}}}>清空資料</button>
                            </div>
                        )}

                        <div className="grid grid-cols-2 gap-3 mb-6">
                            <div className="card p-4">
                                <span className="text-[10px] text-slate-500 uppercase">總市值</span>
                                <p className="text-lg font-bold">${totalMV.toLocaleString()}</p>
                            </div>
                            <div className="card p-4">
                                <span className="text-[10px] text-slate-500 uppercase">總成本</span>
                                <p className="text-lg font-bold">${totalC.toLocaleString()}</p>
                            </div>
                        </div>

                        <div className="space-y-3">
                            {holdings.map(h => {
                                const cur = prices[h.symbol]?.price || 0;
                                const profit = cur ? (cur - (h.cost/h.shares)) * h.shares : 0;
                                return (
                                    <div key={h.symbol} className="card p-4 flex justify-between items-center">
                                        <div>
                                            <p className="font-bold text-sm">{h.symbol} <span className="text-slate-500 font-normal">{h.name}</span></p>
                                            <p className="text-[10px] text-slate-500">{h.shares} 股 | 均價 ${Math.round(h.cost/h.shares)}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-sm font-bold">${cur || '--'}</p>
                                            <p className={`text-[10px] ${profit >= 0 ? 'text-red-400' : 'text-green-400'}`}>
                                                {profit >= 0 ? '+' : ''}{Math.round(profit).toLocaleString()}
                                            </p>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 bg-[#1e293b] p-4 flex justify-around border-t border-slate-700">
                        <button onClick={() => setView('summary')} className={`text-xs ${view === 'summary' ? 'text-blue-400' : 'text-slate-500'}`}>📋 總覽</button>
                        <button className="text-xs text-slate-500" onClick={() => alert('趨勢圖開發中')}>📈 趨勢</button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
